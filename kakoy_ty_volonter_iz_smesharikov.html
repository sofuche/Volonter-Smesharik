    // Рендер формы
    function renderTest() {
        const form = document.getElementById('quizForm');
        form.innerHTML = '';
        questions.forEach((q, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-card';
            qDiv.innerHTML = `
                <div class="question-text">
                    <span class="q-num">Вопрос ${idx+1}</span>
                    <span>${q.text}</span>
                </div>
                <div class="options" data-qidx="${idx}"></div>
            `;
            const optionsDiv = qDiv.querySelector('.options');
            q.options.forEach((opt, optIdx) => {
                const optionId = `q${idx}_opt${optIdx}`;
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerHTML = `
                    <input type="radio" name="q${idx}" value="${opt.char}" id="${optionId}">
                    <label for="${optionId}">${opt.text}</label>
                `;
                optionsDiv.appendChild(optDiv);
            });
            form.appendChild(qDiv);
        });
    }

    // Подсчёт результатов
    function computeResult() {
        const scores = {};
        charList.forEach(ch => scores[ch] = 0);
        let answered = 0;
        for (let i = 0; i < questions.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected) {
                answered++;
                const charVal = selected.value;
                if (scores[charVal] !== undefined) scores[charVal]++;
            }
        }
        if (answered === 0) return null;
        let maxChar = charList[0];
        let maxScore = scores[maxChar];
        for (let ch of charList) {
            if (scores[ch] > maxScore) {
                maxScore = scores[ch];
                maxChar = ch;
            }
        }
        return maxChar;
    }

    // отображение результата с картинкой (эмодзи-аватар) и полными рекомендациями
    function displayResult(characterKey) {
        const data = charactersData[characterKey];
        if (!data) return;
        const container = document.getElementById('resultContainer');
        container.style.display = 'block';
        container.innerHTML = `
            <div class="result-card">
                <div class="character-avatar">${data.emoji}</div>
                <div class="hero-name">${characterKey}</div>
                <div class="role-block">
                    <div class="role-title">✨ Твоя волонтёрская роль</div>
                    <div style="font-size: 1rem; line-height: 1.4;">${data.roles}</div>
                </div>
                <div style="background:#fff5e6; border-radius: 32px; padding: 0.8rem 1.2rem; text-align: left;">
                    <div class="role-title" style="margin-top:0;">🧭 Рекомендованные мероприятия и форматы</div>
                    <ul class="event-list">
                        ${data.events.split('·').map(item => `<li>${item.trim()}</li>`).join('')}
                    </ul>
                </div>
                <button class="reset-btn" id="resetTestBtn">🔄 Пройти тест заново</button>
            </div>
        `;
        container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        const resetBtn = document.getElementById('resetTestBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                const allRadios = document.querySelectorAll('input[type="radio"]');
                allRadios.forEach(radio => radio.checked = false);
                container.style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    }

    function onSubmit() {
        const winner = computeResult();
        if (!winner) {
            alert("💛 Ответь хотя бы на один вопрос, чтобы узнать свой волонтёрский тотем!");
            return;
        }
        displayResult(winner);
    }

    renderTest();
    document.getElementById('submitBtn').addEventListener('click', onSubmit);
</script>
</body>
</html>
